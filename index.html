<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CRT Retro Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@700&display=swap');

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* [핵심] 화면을 오목/볼록하게 깎아내는 컨테이너 */
        #monitor-shaper {
            position: relative;
            width: 800px;
            height: 600px;
            /* 모서리를 원형으로 깎아서 브라운관 느낌 구현 */
            border-radius: 50% / 10%; 
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        #screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #020508;
            /* 화면 자체가 안쪽으로 말린 듯한 왜곡 */
            transform: scaleX(1.1) scaleY(1.1);
        }

        /* 1. CRT 미세 주사선 (가로선) */
        #screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; /* 선 간격 */
            z-index: 10;
            pointer-events: none;
        }

        /* 2. 지지직거리는 노이즈 오버레이 */
        #screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.05);
            opacity: 0.1;
            z-index: 11;
            pointer-events: none;
            animation: grain 0.1s steps(2) infinite;
        }

        @keyframes grain {
            0% { background-position: 0 0; }
            100% { background-position: 10px 10px; }
        }

        canvas {
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
            filter: blur(0.3px) brightness(1.2) contrast(1.1);
        }
    </style>
</head>
<body>

<div id="monitor-shaper">
    <div id="screen">
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 640;
canvas.height = 480;

let page = 0;
const data = [
    {
        title: "[ 캐릭터 정보 ]",
        name: "제갈량", lv: "99",
        hp: 980, mp: 999,
        stats: [["무력", 55], ["지력", 100], ["통솔", 98], ["매력", 99]]
    },
    {
        title: "[ 보유 기술 ]",
        name: "제갈량", lv: "99",
        hp: 980, mp: 999,
        stats: [["자바스크립트", 92], ["리액트", 95], ["게임개발", 85], ["알고리즘", 88]]
    }
];

function draw() {
    const d = data[page];
    
    // 배경색
    ctx.fillStyle = "#020810";
    ctx.fillRect(0, 0, 640, 480);

    // [노이즈] 매 프레임 무작위 픽셀 노이즈 추가
    for (let i = 0; i < 300; i++) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.03})`;
        ctx.fillRect(Math.random() * 640, Math.random() * 480, 1, 1);
    }

    // RPG 스타일 흰색 박스
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.strokeRect(40, 40, 560, 400);

    ctx.fillStyle = "white";
    ctx.font = "bold 26px 'Nanum Gothic Coding'";
    ctx.textAlign = "center";
    ctx.fillText(d.title, 320, 85);

    ctx.textAlign = "left";
    ctx.font = "24px 'Nanum Gothic Coding'";
    ctx.fillText(`이름: ${d.name}`, 80, 150);
    ctx.fillText(`레벨: ${d.lv}`, 420, 150);

    // 게이지 그리기
    const drawBar = (label, val, max, y, color) => {
        ctx.fillText(label, 80, y);
        ctx.fillStyle = "#111";
        ctx.fillRect(150, y - 20, 400, 24);
        ctx.fillStyle = color;
        ctx.fillRect(150, y - 20, (val / max) * 400, 24);
        ctx.strokeStyle = "white";
        ctx.strokeRect(150, y - 20, 400, 24);
        ctx.fillStyle = "white";
    };
    drawBar("생명", d.hp, 1000, 210, "#cc3333");
    drawBar("마력", d.mp, 1000, 260, "#3366cc");

    // 상세 스탯
    d.stats.forEach((s, i) => {
        let x = (i % 2 === 0) ? 80 : 340;
        let y = 330 + (Math.floor(i / 2) * 60);
        ctx.font = "22px 'Nanum Gothic Coding'";
        ctx.fillText(`${s[0]}: ${s[1]}`, x, y);
        ctx.fillStyle = "#222";
        ctx.fillRect(x, y + 10, 200, 4);
        ctx.fillStyle = "#00ff88";
        ctx.fillRect(x, y + 10, s[1] * 2, 4);
        ctx.fillStyle = "white";
    });

    // 화면 미세 흔들림 (Vsync 불안정 느낌)
    const vSyncOffset = (Math.random() - 0.5) * 0.5;
    canvas.style.transform = `translateY(${vSyncOffset}px)`;

    requestAnimationFrame(draw);
}

canvas.addEventListener('click', () => { page = (page + 1) % data.length; });
draw();
</script>
</body>
</html>
