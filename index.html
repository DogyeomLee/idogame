<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KBS 동물의 왕국 - 레트로 포트폴리오</title>
    <style>
        /* 1. 환경 설정: 어두운 거실 */
        body {
            background-color: #050505;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px; /* 3D 공간감 */
        }

        /* 2. 묵직한 구형 모니터 베젤 (플라스틱 질감) */
        .monitor-body {
            position: relative;
            width: 90vw;
            max-width: 1000px;
            aspect-ratio: 4 / 3;
            background: #222;
            padding: 40px;
            border-radius: 10% / 5%;
            box-shadow: 
                inset 0 0 50px #000,
                20px 30px 60px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. 물리적으로 볼록한 브라운관 유리 */
        .crt-glass {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50% / 10%; /* 화면 자체를 둥글게 */
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,1);
            transform: scale(1.05) rotateX(2deg); /* 약간 앞으로 튀어나온 느낌 */
        }

        /* 실제 영상 송출 영역 */
        .display-content {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1549366021-9f761d450615?q=80&w=2000') no-repeat center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 자막 위치 */
            padding: 60px;
            box-sizing: border-box;
            animation: screen-flicker 0.01s infinite; /* 미세한 떨림 */
        }

        /* 4. 다큐멘터리 자막 폰트 (레트로 스타일) */
        .subtitles {
            font-family: 'Gulim', '돋움', sans-serif;
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            /* 90년대 자막 특유의 진한 검정 테두리 */
            text-shadow: 
                3px 3px 0 #000, -3px -3px 0 #000, 
                3px -3px 0 #000, -3px 3px 0 #000,
                0px 4px 5px rgba(0,0,0,0.8);
            letter-spacing: -1px;
        }

        /* 5. 화면 왜곡 레이어 (비네팅, 스캔라인) */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 90%), /* 비네팅 */
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), /* 가로 스캔라인 */
                linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02)); /* RGB 정렬 불량 */
            background-size: 100% 100%, 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 화면 켤 때 지지직거리는 애니메이션 */
        @keyframes screen-flicker {
            0% { opacity: 0.99; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        /* 옛날 방송국 로고 */
        .tv-logo {
            position: absolute;
            top: 40px;
            right: 50px;
            color: rgba(255, 255, 255, 0.5);
            font-family: serif;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

<div class="monitor-body">
    <div class="crt-glass">
        <div class="crt-overlay"></div>
        
        <div class="display-content">
            <div class="tv-logo">KBS1</div>
            
            <div class="subtitles">
                [오늘의 탐험]<br>
                코드의 정글에서 살아남은 개발자 홍길동,<br>
                그는 왜 깃허브 페이지에 서식하게 되었나...
            </div>
        </div>
    </div>
</div>

<script>
    // 클릭하면 지지직거리는 효과음을 넣거나 화면을 끄고 켜는 인터랙션을 추가할 수 있습니다.
</script>

</body>
</html>
