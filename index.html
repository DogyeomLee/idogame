<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>90s RPG Status Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&display=swap');

        * { margin: 0; padding: 0; overflow: hidden; }
        body {
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            /* 배경에 미세한 노이즈 */
            background-image: radial-gradient(#111 0.5px, transparent 0.5px);
            background-size: 4px 4px;
        }

        /* [핵심] 볼록렌즈 왜곡을 만드는 컨테이너 */
        #crt-monitor {
            position: relative;
            width: 95vw;
            height: 71.25vw; /* 4:3 비율 */
            max-width: 900px;
            max-height: 675px;
            
            /* 구체 형태로 왜곡 */
            border-radius: 50% / 10%; 
            transform: scale(1.1) perspective(1000px) rotateX(1deg);
            box-shadow: 
                0 0 0 20px #1a1a1a, /* 모니터 프레임 */
                0 50px 100px rgba(0,0,0,0.9),
                inset 0 0 80px rgba(0,0,0,0.8);
            overflow: hidden;
            background: #000;
        }

        /* 내부 화면 - 실제보다 크게 설정 후 안쪽으로 말아넣어 왜곡 극대화 */
        #screen {
            width: 110%;
            height: 110%;
            position: absolute;
            top: -5%;
            left: -5%;
            border-radius: 20%; /* 화면 끝부분 곡선 처리 */
            background: #001; /* 로딩 전 배경 */
        }

        canvas {
            width: 100%;
            height: 100%;
            cursor: pointer;
            image-rendering: pixelated; /* 픽셀 느낌 강조 */
        }

        /* CRT 주사선 오버레이 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.03), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 유리 반사광 효과 */
        #glass-glare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 6;
        }
    </style>
</head>
<body>

    <div id="crt-monitor">
        <div id="screen">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div id="overlay"></div>
        <div id="glass-glare"></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 1000;
canvas.height = 750;

let page = 0;
const data = [
    {
        title: "武 將 情 報 (캐릭터 정보)",
        name: "諸葛亮 (제갈량)", lv: "99",
        hp: 980, mp: 999,
        stats: [["武力 (STR)", 55], ["知力 (INT)", 100], ["統率 (LEA)", 98], ["魅力 (CHA)", 99]]
    },
    {
        title: "技 能 目 錄 (보유 기술)",
        name: "諸葛亮 (제갈량)", lv: "99",
        hp: 980, mp: 999,
        stats: [["JAVASCRIPT", 92], ["TYPESCRIPT", 88], ["WEBGL", 85], ["REACT", 95]]
    }
];

function draw() {
    const d = data[page];
    
    // 1. 삼국지 특유의 암청색 배경
    const bgGrad = ctx.createRadialGradient(500, 375, 100, 500, 375, 600);
    bgGrad.addColorStop(0, "#001a4d");
    bgGrad.addColorStop(1, "#000a20");
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, 1000, 750);

    // 2. 황금색 이중 테두리 (장식)
    ctx.strokeStyle = "#750"; ctx.lineWidth = 15;
    ctx.strokeRect(40, 40, 920, 670);
    ctx.strokeStyle = "#d90"; ctx.lineWidth = 4;
    ctx.strokeRect(55, 55, 890, 640);

    // 3. 상단 타이틀 영역
    ctx.fillStyle = "#750";
    ctx.fillRect(55, 55, 890, 80);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 42px 'Nanum Gothic Coding', monospace";
    ctx.textAlign = "center";
    ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
    ctx.fillText(d.title, 500, 110);
    ctx.shadowBlur = 0;

    // 4. 캐릭터 기본 스탯 (삼국지 색감)
    ctx.textAlign = "left";
    ctx.font = "bold 38px 'Nanum Gothic Coding', monospace";
    
    // 이름/레벨
    ctx.fillStyle = "#0ff"; ctx.fillText(`氏名: ${d.name}`, 100, 210);
    ctx.fillStyle = "#fb0"; ctx.fillText(`等級: ${d.lv}`, 100, 280);

    // HP/MP 바 (클래식 스타일)
    const drawBar = (label, val, max, y, color) => {
        ctx.fillStyle = "#fff"; ctx.font = "28px 'Nanum Gothic Coding'";
        ctx.fillText(label, 100, y);
        ctx.fillStyle = "#111"; ctx.fillRect(220, y-22, 400, 28);
        ctx.fillStyle = color; ctx.fillRect(220, y-22, (val/max)*400, 28);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.strokeRect(220, y-22, 400, 28);
    };
    drawBar("體力", d.hp, 1000, 360, "#d33");
    drawBar("氣力", d.mp, 1000, 420, "#38f");

    // 5. 능력치 박스
    ctx.strokeStyle = "#d90"; ctx.lineWidth = 2;
    ctx.strokeRect(100, 480, 800, 180);
    
    d.stats.forEach((s, i) => {
        let x = (i % 2 === 0) ? 140 : 540;
        let y = 540 + (Math.floor(i/2) * 70);
        ctx.fillStyle = "#ccc"; ctx.font = "32px 'Nanum Gothic Coding'";
        ctx.fillText(s[0], x, y);
        
        ctx.fillStyle = "#0f0";
        ctx.fillText(s[1].toString(), x + 250, y);
        
        // 작은 게이지
        ctx.fillStyle = "#222"; ctx.fillRect(x, y+15, 320, 8);
        ctx.fillStyle = "#0f0"; ctx.fillRect(x, y+15, s[1]*3.2, 8);
    });

    // 6. 하단 안내문구 (깜빡임)
    if (Math.floor(Date.now() / 600) % 2 === 0) {
        ctx.textAlign = "center"; ctx.fillStyle = "#fb0";
        ctx.font = "24px 'Nanum Gothic Coding'";
        ctx.fillText("▼ 點擊 畵面 (화면을 클릭하세요)", 500, 710);
    }

    requestAnimationFrame(draw);
}

canvas.addEventListener('click', () => { page = (page + 1) % data.length; });
draw();
</script>
</body>
</html>
