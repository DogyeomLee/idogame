<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CRT SAFE MODE</title>

<style>
body{
    margin:0;
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 4:3 */
#wrap{
    aspect-ratio:4/3;
    height:95vh;
}

#screen{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* 메인 캔버스 */
canvas{
    position:absolute;
    width:100%;
    height:100%;
}

/* 🪟 유리 */
#glass{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* 가장자리 */
#edge{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    box-shadow: inset 0 0 100px rgba(0,0,0,1);
}
</style>
</head>

<body>

<div id="wrap">
<div id="screen">

<canvas id="c"></canvas>
<div id="glass"></div>
<div id="edge"></div>

</div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 600;

let mx=400,my=300;

/* 🪟 유리 마우스 반응 */
const glass = document.getElementById("glass");
canvas.addEventListener("mousemove",(e)=>{
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX-r.left)*(800/r.width);
    my = (e.clientY-r.top)*(600/r.height);

    glass.style.background =
    `radial-gradient(circle at ${mx/8}% ${my/6}%,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.08) 30%,
    transparent 60%)`;
});

/* 별 */
let stars=[];
for(let i=0;i<60;i++){
    stars.push({
        x:Math.random()*800,
        y:Math.random()*600,
        z:Math.random()*2+0.5
    });
}

/* 메뉴 */
const menu=["START","OPTIONS","EXIT"];
let hover=-1;

/* 루프 */
function loop(){

/* 배경 */
ctx.fillStyle="#05060a";
ctx.fillRect(0,0,800,600);

/* 🌌 3D 느낌 별 */
stars.forEach(s=>{
    s.y+=s.z*0.5;
    if(s.y>600){ s.y=0; s.x=Math.random()*800; }

    let px = s.x + (mx-400)*0.03*s.z;
    let py = s.y + (my-300)*0.03*s.z;

    ctx.fillStyle="white";
    ctx.fillRect(px,py,s.z*2,s.z*2);
});

/* 타이틀 */
ctx.textAlign="center";
ctx.fillStyle="#fff";
ctx.font="bold 70px monospace";
ctx.fillText("CRT GAME",400,200);

/* 메뉴 */
hover=-1;
menu.forEach((m,i)=>{
    let y=320+i*60;

    let isHover = mx>250 && mx<550 && my>y-30 && my<y+20;
    if(isHover) hover=i;

    ctx.fillStyle=isHover?"#fff":"#777";
    ctx.font=isHover?"bold 28px monospace":"24px monospace";
    ctx.fillText(m,400,y);
});

/* ===== CRT 효과 (2D 방식) ===== */

/* 🔴 RGB 분리 */
let img = ctx.getImageData(0,0,800,600);
let d = img.data;

for(let i=0;i<d.length;i+=4){
    let x = (i/4)%800;

    if(x%3===0) d[i+1]=0;
    if(x%3===1) d[i+2]=0;
}

/* 📺 스캔라인 */
for(let y=0;y<600;y+=2){
    for(let x=0;x<800;x++){
        let i=(y*800+x)*4;
        d[i]*=0.7;
        d[i+1]*=0.7;
        d[i+2]*=0.7;
    }
}

/* 📡 노이즈 */
for(let i=0;i<d.length;i+=4){
    let n = (Math.random()-0.5)*20;
    d[i]+=n; d[i+1]+=n; d[i+2]+=n;
}

ctx.putImageData(img,0,0);

/* 🌀 약한 비네팅 */
let grad = ctx.createRadialGradient(400,300,100,400,300,400);
grad.addColorStop(0,"rgba(0,0,0,0)");
grad.addColorStop(1,"rgba(0,0,0,0.8)");

ctx.fillStyle=grad;
ctx.fillRect(0,0,800,600);

requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
