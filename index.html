<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro CRT Interface</title>
    <style>
        /* 1. 기본 배경 및 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #050505;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. 4:3 비율 유지용 컨테이너 */
        .monitor-wrapper {
            width: 80vw;
            max-width: 1000px;
            aspect-ratio: 4 / 3;
            position: relative;
            background: #000;
            /* 브라운관 특유의 볼록한 테두리 */
            box-shadow: 
                0 0 100px rgba(0, 0, 0, 1),
                inset 0 0 100px rgba(0, 255, 0, 0.05);
            border-radius: 4% / 6%; 
            overflow: hidden;
        }

        /* 3. CRT 렌즈 왜곡 효과 (핵심) */
        .screen-content {
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            background: linear-gradient(180deg, #0d120d 0%, #050805 100%);
            display: flex;
            flex-direction: column;
            color: #33ff33;
            font-family: 'Press Start 2P', cursive;
            line-height: 1.6;
            /* 구형 왜곡 애니메이션 대용: 화면이 살짝 부풀어 보임 */
            border-radius: 50% / 10%;
            position: relative;
            z-index: 1;
        }

        /* 4. CRT 물리적 효과 레이어 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                /* 1: 가로 주사선 (Scanlines) */
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                /* 2: 미세한 RGB 마스크 격자 */
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* 5. 정전기 노이즈 및 깜빡임 */
        .crt-overlay::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 6;
            pointer-events: none;
            animation: flicker 0.12s infinite;
        }

        /* 6. 화면 상단 반사광 (유리 느낌) */
        .glass-glare {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(
                circle at 50% -20%, 
                rgba(255, 255, 255, 0.1) 0%, 
                transparent 50%
            );
            z-index: 7;
            pointer-events: none;
        }

        /* 게임 스타일 UI 요소 */
        .header {
            border-bottom: 4px double #33ff33;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
        }

        .menu-item {
            margin: 15px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: #33ff33;
            color: #000;
        }

        .blink { animation: blink 0.8s step-end infinite; }

        /* 애니메이션 정의 */
        @keyframes flicker {
            0% { opacity: 0.1; }
            50% { opacity: 0.15; }
            100% { opacity: 0.1; }
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="monitor-wrapper">
    <!-- CRT 특수 효과 -->
    <div class="crt-overlay"></div>
    <div class="glass-glare"></div>
    
    <!-- 실제 내용 -->
    <div class="screen-content">
        <div class="header">
            <span>PLAYER: DEV</span>
            <span>SCORE: 9999</span>
        </div>

        <div class="main-body">
            <h1 style="font-size: 24px; text-shadow: 4px 4px #c00;">INSERT COIN</h1>
            <p style="font-size: 12px; margin-top: 40px;">-- SELECT MISSION --</p>
            
            <div class="menu-item">> PROJECT_NEON_STRIKE</div>
            <div class="menu-item">> SKILL_TREE_LEVEL_99</div>
            <div class="menu-item">> CONTACT_TERMINAL</div>
        </div>

        <div style="margin-top: auto; font-size: 10px; text-align: center;">
            © 1994 GAME_DEV_INC. <span class="blink">_</span>
        </div>
    </div>
</div>

</body>
</html>
