<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Perfect Retro Stat Screen</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body {
            background-color: #0a0a0a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            perspective: 1000px; /* 3D 효과를 위한 설정 */
        }

        /* 1. 볼록한 렌즈 효과를 주는 실제 유리관 컨테이너 */
        #monitor-glass {
            position: relative;
            width: 90vw;
            height: 67.5vw; /* 4:3 비율 */
            max-width: 1000px;
            max-height: 750px;
            background: #000;
            border-radius: 50% / 10%; /* 볼록한 곡면 느낌 */
            overflow: hidden;
            box-shadow: 
                0 0 100px rgba(0,0,0,1),
                inset 0 0 100px rgba(0,255,255,0.1);
            transform: rotateX(2deg) scale(1.05); /* 약간 앞으로 튀어나온 느낌 */
            border: 2px solid #333;
        }

        /* 2. CRT 주사선 및 정전기 효과 (레이어) */
        #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 3. 화면 번쩍임 및 비네팅 */
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 11;
        }

        canvas { width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="monitor-glass">
        <canvas id="gameCanvas"></canvas>
        <div id="scanlines"></div>
        <div id="vignette"></div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 해상도 설정
canvas.width = 1000;
canvas.height = 750;

let page = 0;
const data = [
    {
        title: "CHARACTER STATUS",
        name: "GEMINI", lv: "99",
        hp: 850, mp: 420,
        stats: [["STR", 85], ["INT", 99], ["AGI", 72], ["LUK", 60]]
    },
    {
        title: "SKILL INVENTORY",
        name: "GEMINI", lv: "99",
        hp: 850, mp: 420,
        stats: [["REACT", 90], ["WEBGL", 85], ["CANVAS", 95], ["UI/UX", 80]]
    }
];

function draw() {
    const d = data[page];
    
    // 배경색
    ctx.fillStyle = "#000033";
    ctx.fillRect(0, 0, 1000, 750);

    // 삼국지 스타일 황금 테두리
    ctx.strokeStyle = "#860"; ctx.lineWidth = 15;
    ctx.strokeRect(30, 30, 940, 690);
    ctx.strokeStyle = "#fb0"; ctx.lineWidth = 2;
    ctx.strokeRect(45, 45, 910, 660);

    // 타이틀
    ctx.fillStyle = "#860"; ctx.fillRect(45, 45, 910, 70);
    ctx.fillStyle = "#fff"; ctx.font = "bold 40px monospace"; ctx.textAlign = "center";
    ctx.fillText(d.title, 500, 95);

    // 캐릭터 정보
    ctx.textAlign = "left";
    ctx.fillStyle = "#0ff"; ctx.fillText(`NAME: ${d.name}`, 100, 200);
    ctx.fillStyle = "#ff0"; ctx.fillText(`LV  : ${d.lv}`, 100, 260);

    // 게이지바
    const bar = (label, val, max, y, color) => {
        ctx.fillStyle = "#fff"; ctx.font = "25px monospace";
        ctx.fillText(label, 100, y);
        ctx.fillStyle = "#111"; ctx.fillRect(200, y-20, 400, 25);
        ctx.fillStyle = color; ctx.fillRect(200, y-20, (val/max)*400, 25);
    };
    bar("HP", d.hp, 1000, 330, "#f33");
    bar("MP", d.mp, 500, 380, "#3af");

    // 스탯 박스
    ctx.strokeStyle = "#fb0"; ctx.strokeRect(100, 440, 800, 220);
    d.stats.forEach((s, i) => {
        let x = (i % 2 === 0) ? 150 : 550;
        let y = 500 + (Math.floor(i/2) * 80);
        ctx.fillStyle = "#fff"; ctx.fillText(`${s[0]}: ${s[1]}`, x, y);
        ctx.fillStyle = "#222"; ctx.fillRect(x, y+10, 300, 8);
        ctx.fillStyle = "#0f0"; ctx.fillRect(x, y+10, s[1]*3, 8);
    });

    // 하단 깜빡임
    if (Math.floor(Date.now() / 600) % 2 === 0) {
        ctx.textAlign = "center"; ctx.fillStyle = "#fb0";
        ctx.fillText(">> PRESS TO SWITCH <<", 500, 710);
    }

    requestAnimationFrame(draw);
}

canvas.addEventListener('click', () => { page = (page + 1) % data.length; });
draw();
</script>
</body>
</html>
