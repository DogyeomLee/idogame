<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CRT Game Console</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #080808;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ff00; /* 레트로 그린 */
            font-family: 'Courier New', Courier, monospace;
        }

        /* 1. TV 케이스 (4:3 비율 유지) */
        .tv-wrapper {
            width: 80vw;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background: #151515;
            padding: 20px;
            border-radius: 40px;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. 볼록한 화면 테두리 (핵심 굴곡) */
        .crt-screen {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            overflow: hidden;
            
            /* 테두리를 항아리 모양으로 깎음 */
            border-radius: 50% / 8%; 
            box-shadow: 0 0 0 10px #151515; /* 베젤 연결 부위 */
        }

        /* 3. 실제 이미지 (image_01e5fb.jpg) */
        .image-content {
            width: 100%;
            height: 100%;
            background-image: url('image_01e5fb.jpg');
            background-size: cover;
            background-position: center;
            /* 테두리 굴곡에 맞춰 이미지를 마스킹 */
            border-radius: 50% / 8%;
        }

        /* 4. CRT 광택 및 비네팅 효과 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 가쪽을 어둡게 해서 중앙이 볼록해 보이게 함 */
            background: radial-gradient(
                circle at center, 
                rgba(255,255,255,0.05) 0%, 
                rgba(0,0,0,0.2) 50%, 
                rgba(0,0,0,0.9) 100%
            );
            pointer-events: none;
        }

        /* 5. 하단 메시지 스타일 */
        .welcome-msg {
            margin-top: 30px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00ff00;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="tv-wrapper">
        <div class="crt-screen">
            <div class="image-content"></div>
            <div class="overlay"></div>
        </div>
    </div>

    <div class="welcome-msg">
        어서오십시오 게임하십시오
    </div>

</body>
</html>
