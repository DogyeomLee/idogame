<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>레트로 RPG 스테이터스</title>
    <style>
        /* 기본 배경 및 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@700&display=swap');

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* [핵심] CRT 볼록 렌즈 효과 */
        #crt-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
            border: 20px solid #333;
            border-radius: 40px; /* 외곽 베젤 */
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* 화면을 안쪽으로 굽게 만드는 왜곡 */
        #screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000511;
            /* 어안 렌즈 왜곡 효과 */
            transform: scale(1.05);
            filter: contrast(1.2) brightness(1.1);
        }

        /* 지지직거리는 노이즈 및 주사선 */
        #screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 지지직거리는 애니메이션 */
        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }
        .scanline-bar {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0) 100%);
            position: absolute;
            top: -100px;
            z-index: 11;
            animation: scanline 8s linear infinite;
        }

        canvas {
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="crt-container">
    <div id="screen">
        <div class="scanline-bar"></div>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 레트로 해상도 (낮게 설정하여 픽셀 느낌 강조)
canvas.width = 640;
canvas.height = 480;

let page = 0;
const data = [
    {
        title: "[ 캐릭터 정보 ]",
        name: "제갈량", lv: "99",
        hp: 980, mp: 999,
        stats: [["무력", 55], ["지력", 100], ["통솔", 98], ["매력", 99]]
    },
    {
        title: "[ 보유 기술 ]",
        name: "제갈량", lv: "99",
        hp: 980, mp: 999,
        stats: [["자바스크립트", 92], ["리액트", 95], ["게임개발", 85], ["알고리즘", 88]]
    }
];

function draw() {
    const d = data[page];
    
    // 1. 화면 초기화 (약간의 잔상 효과를 위해 투명도 조절)
    ctx.fillStyle = "#000511";
    ctx.fillRect(0, 0, 640, 480);

    // 2. 미세한 지지직 효과 (노이즈 픽셀)
    for (let i = 0; i < 500; i++) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.05})`;
        ctx.fillRect(Math.random() * 640, Math.random() * 480, 1, 1);
    }

    // 3. 고전 RPG 레이아웃 (흰색 테두리 상자)
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.strokeRect(20, 20, 600, 440);
    ctx.strokeRect(30, 30, 580, 420); // 이중 테두리

    // 4. 텍스트 렌더링
    ctx.fillStyle = "white";
    ctx.font = "24px 'Nanum Gothic Coding'";
    ctx.textAlign = "center";
    
    // 타이틀
    ctx.fillText(d.title, 320, 70);

    // 기본 스탯
    ctx.textAlign = "left";
    ctx.font = "28px 'Nanum Gothic Coding'";
    ctx.fillText(`이름: ${d.name}`, 60, 130);
    ctx.fillText(`레벨: ${d.lv}`, 400, 130);

    // HP/MP 바
    const drawBar = (label, val, max, y, color) => {
        ctx.font = "20px 'Nanum Gothic Coding'";
        ctx.fillText(label, 60, y);
        ctx.fillStyle = "#333";
        ctx.fillRect(120, y - 18, 450, 20);
        ctx.fillStyle = color;
        ctx.fillRect(120, y - 18, (val / max) * 450, 20);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(120, y - 18, 450, 20);
        ctx.fillStyle = "white";
    };
    drawBar("생명", d.hp, 1000, 180, "#e74c3c");
    drawBar("마력", d.mp, 1000, 220, "#3498db");

    // 상세 능력치
    ctx.lineWidth = 2;
    ctx.strokeRect(60, 260, 520, 150);
    
    d.stats.forEach((s, i) => {
        let x = (i % 2 === 0) ? 90 : 340;
        let y = 305 + (Math.floor(i / 2) * 60);
        ctx.font = "22px 'Nanum Gothic Coding'";
        ctx.fillText(`${s[0]}: ${s[1]}`, x, y);
        
        // 능력치 미니 게이지
        ctx.fillStyle = "#555";
        ctx.fillRect(x, y + 10, 200, 5);
        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(x, y + 10, s[1] * 2, 5);
        ctx.fillStyle = "white";
    });

    // 하단 안내 (깜빡임)
    if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.textAlign = "center";
        ctx.font = "18px 'Nanum Gothic Coding'";
        ctx.fillText("- 클릭하여 페이지 전환 -", 320, 440);
    }

    // 5. 화면 미세 떨림 구현 (JS)
    const jitterX = (Math.random() - 0.5) * 0.3;
    const jitterY = (Math.random() - 0.5) * 0.3;
    canvas.style.transform = `translate(${jitterX}px, ${jitterY}px)`;

    requestAnimationFrame(draw);
}

canvas.addEventListener('click', () => { page = (page + 1) % data.length; });
draw();
</script>

</body>
</html>
