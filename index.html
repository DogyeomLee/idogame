<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진짜 CRT 볼록 왜곡과 노이즈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@700&display=swap');

        body {
            background-color: #020202;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* [핵심] 화면 전체에 볼록한 렌즈 효과 부여 */
        .crt-container {
            position: relative;
            width: 800px;
            height: 600px;
            /* 4방향 변을 볼록하게 만드는 곡률 */
            border-radius: 50% / 10%; 
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        /* 내부 화면 레이어: 상하 곡률 추가 */
        .screen {
            width: 100%;
            height: 100%;
            position: relative;
            background: #08080c;
            border-radius: 10% / 50%; /* 가로 세로 곡률 교차로 볼록함 극대화 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. 실제 이미지 같은 지지직거리는 노이즈 (Glitch) */
        .glitch-noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_hz_sine_multi_tone_noise.png');
            opacity: 0.15;
            z-index: 20;
            pointer-events: none;
            mix-blend-mode: overlay;
            animation: noise-move 0.1s steps(1) infinite;
        }

        @keyframes noise-move {
            0% { background-position: 0% 0%; }
            100% { background-position: 10% 20%; }
        }

        /* 2. 주사선 (Scanlines) - 더 가늘고 촘촘하게 */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.3) 50%
            );
            background-size: 100% 3px;
            z-index: 21;
            pointer-events: none;
        }

        /* 3. 화면 외곽 비네팅 (이미지처럼 모서리를 어둡게) */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(
                circle at center,
                transparent 40%,
                rgba(0, 0, 0, 0.9) 95%
            );
            z-index: 22;
            pointer-events: none;
        }

        canvas {
            width: 110%; /* 왜곡 여백 커버 */
            height: 110%;
            image-rendering: pixelated;
            filter: blur(0.5px) brightness(1.2) contrast(1.1);
        }
    </style>
</head>
<body>

<div class="crt-container">
    <div class="screen">
        <div class="glitch-noise"></div>
        <div class="scanlines"></div>
        <div class="vignette"></div>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 640;
canvas.height = 480;

let page = 0;
const data = [
    {
        title: "캐릭터 정보",
        name: "제갈량", lv: "99",
        hp: 980, mp: 999,
        stats: [["무력", 55], ["지력", 100], ["통솔", 98], ["매력", 99]]
    },
    {
        title: "보유 기술",
        name: "제갈량", lv: "99",
        hp: 980, mp: 999,
        stats: [["지식", 92], ["창의", 95], ["논리", 85], ["열정", 88]]
    }
];

function draw() {
    const d = data[page];
    
    // 심해색 배경
    ctx.fillStyle = "#050810";
    ctx.fillRect(0, 0, 640, 480);

    // [지지직 포인트 1] 매 프레임 무작위 가로줄 그리기 (전파 방해 느낌)
    if (Math.random() > 0.9) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
        ctx.fillRect(0, Math.random() * 480, 640, Math.random() * 5);
    }

    // RPG 박스
    ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
    ctx.lineWidth = 4;
    ctx.strokeRect(60, 60, 520, 360);

    ctx.fillStyle = "white";
    ctx.font = "bold 30px 'Nanum Gothic Coding'";
    ctx.textAlign = "center";
    ctx.fillText(d.title, 320, 110);

    ctx.textAlign = "left";
    ctx.fillText(`이름: ${d.name}`, 100, 175);
    ctx.fillText(`LV: ${d.lv}`, 450, 175);

    // 게이지
    const drawBar = (label, val, max, y, color) => {
        ctx.font = "22px 'Nanum Gothic Coding'";
        ctx.fillText(label, 100, y);
        ctx.fillStyle = "#111";
        ctx.fillRect(160, y - 22, 380, 26);
        ctx.fillStyle = color;
        ctx.fillRect(160, y - 22, (val / max) * 380, 26);
        ctx.strokeStyle = "white";
        ctx.strokeRect(160, y - 22, 380, 26);
    };
    drawBar("HP", d.hp, 1000, 240, "#c00");
    drawBar("MP", d.mp, 1000, 290, "#06c");

    // 상세 스탯
    d.stats.forEach((s, i) => {
        let x = (i % 2 === 0) ? 100 : 340;
        let y = 355 + (Math.floor(i / 2) * 60);
        ctx.fillStyle = "white";
        ctx.font = "20px 'Nanum Gothic Coding'";
        ctx.fillText(`${s[0]}: ${s[1]}`, x, y);
    });

    // [지지직 포인트 2] 화면 미세 진동 (Horizontal Shake)
    const shakeX = (Math.random() - 0.5) * 1.5;
    canvas.style.left = shakeX + "px";

    requestAnimationFrame(draw);
}

canvas.addEventListener('click', () => { page = (page + 1) % data.length; });
draw();
</script>
</body>
</html>
