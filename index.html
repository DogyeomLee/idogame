<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CRT Screen Concept</title>
    <style>
        /* 1. 배경 설정: 화면 전체를 검게 채웁니다. */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 2. TV 프레임: 화면을 거의 꽉 채우되, 모서리 곡률을 극도로 줄였습니다. */
        .tv-frame {
            width: 98vw;
            height: 98vh;
            background: #050505; /* 아주 어두운 회색 베젤 */
            border-radius: 10px; /* 모서리를 아주 살짝만 둥글게 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        /* 3. 실제 화면 영역: 원본 이미지 특유의 '약간 볼록한' 느낌을 재현합니다. */
        .screen-area {
            width: 95%;
            height: 92%;
            background-color: #1a1a1a;
            position: relative;
            overflow: hidden;
            border-radius: 40px / 20px; /* 상하좌우 곡률을 다르게 주어 브라운관 느낌 형성 */
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        /* 4. 이미지 배치: image_0be285.jpg 파일이 들어갈 자리 */
        .content-image {
            width: 100%;
            height: 100%;
            /* 아래 줄의 경로를 실제 파일명으로 유지하세요. */
            background-image: url('image_0be285.jpg'); 
            background-size: cover;
            background-position: center;
            /* 지글거림 없이 선명하게 출력 */
            image-rendering: auto; 
        }

        /* 5. 비네팅 효과: 화면 가장자리가 어두워지는 원본의 특징 재현 */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center, 
                transparent 50%, 
                rgba(0,0,0,0.4) 80%, 
                rgba(0,0,0,0.8) 100%
            );
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="tv-frame">
        <div class="screen-area">
            <!-- 실제 이미지가 선명하게 들어가는 부분 -->
            <div class="content-image"></div>
            <!-- 화면의 깊이감을 주는 오버레이 -->
            <div class="vignette"></div>
        </div>
    </div>

</body>
</html>
