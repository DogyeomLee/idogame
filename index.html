<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro CRT Fisheye</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* 실제 모니터 밖 어두운 공간 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Dotum', '돋움', sans-serif;
        }

        /* 1. 실제 유리알처럼 볼록한 화면 몸체 */
        .crt-container {
            position: relative;
            width: 90vw;
            height: calc(90vw * 0.75);
            max-height: 90vh;
            max-width: calc(90vh * 1.33);
            
            /* 핵심: 모서리를 안쪽으로 강하게 깎아서 볼록한 유리 구체 느낌 생성 */
            border-radius: 50% / 15%; 
            background: #111;
            box-shadow: 
                0 0 100px rgba(0,0,0,1),
                inset 0 0 100px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid #1a1a1a; /* 아주 얇은 모니터 끝 테두리만 */
        }

        /* 2. 화면 내부 콘텐츠 레이어 (왜곡 효과 중심) */
        .screen-content {
            width: 120%; /* 왜곡을 위해 실제보다 크게 설정 */
            height: 120%;
            background: #1a1e26;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* 콘텐츠 자체도 둥글게 왜곡 */
            border-radius: 50%; 
            position: relative;
            z-index: 1;
        }

        /* 3. 물리적인 브라운관 필터 (주사선 + 강한 비네팅) */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                /* 촘촘한 가로줄 */
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%),
                /* 모서리를 검게 태우는 강한 곡면 효과 */
                radial-gradient(circle, transparent 35%, rgba(0,0,0,0.9) 100%);
            background-size: 100% 4px, cover;
            z-index: 10;
            pointer-events: none;
        }

        /* 로딩 UI 요소 - 이미지 느낌으로 투박하게 배치 */
        .main-img-area {
            width: 300px;
            height: 300px;
            background: #2c3e50; /* 이미지 대신 들어갈 공간 */
            border: 2px solid #555;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
            font-weight: bold;
            transform: scale(1.2); /* 렌즈 효과 강조를 위해 확대 */
        }

        .loading-bar-wrap {
            width: 50%;
            height: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 2px;
        }

        .bar-fill {
            width: 45%;
            height: 100%;
            background: #f1c40f; /* 스타 특유의 노란색 */
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            animation: sc-load 8s infinite steps(10);
        }

        /* 상단 전압 떨림 효과 */
        @keyframes flicker {
            0% { opacity: 0.98; transform: skewX(0deg); }
            5% { opacity: 0.95; transform: skewX(0.1deg); }
            10% { opacity: 0.99; }
            100% { opacity: 1; }
        }
        .screen-content { animation: flicker 0.1s infinite; }

        @keyframes sc-load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

<div class="crt-container">
    <!-- 화면을 덮는 유리 왜곡/필터 레이어 -->
    <div class="overlay"></div>
    
    <!-- 실제 내용물이 들어가는 둥근 레이어 -->
    <div class="screen-content">
        <div class="main-img-area">
            [ 2001 IMAGE ]
        </div>
        
        <div class="loading-bar-wrap">
            <div class="bar-fill"></div>
        </div>
        
        <p style="color: #f1c40f; font-size: 12px; margin-top: 15px; letter-spacing: 2px;">
            MAP LOADING...
        </p>
    </div>
</div>

</body>
</html>
