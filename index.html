<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro Loading Screen</title>
    <style>
        /* 2000년대 초반의 상징, 굴림/돋움 비트맵 감성 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 안티앨리어싱을 꺼서 더 거칠게 표현 */
            font-family: 'Dotum', '돋움', 'Courier New', monospace;
            -webkit-font-smoothing: none;
        }

        /* 4:3 비율의 꽉 찬 모니터 */
        .crt-monitor {
            position: relative;
            width: 98vw;
            height: calc(98vw * 0.75);
            max-height: 98vh;
            max-width: calc(98vh * 1.33);
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #333;
        }

        /* CRT 주사선 효과 (더 진하게) */
        .crt-scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        /* 중앙 로딩 섹션 */
        .loading-container {
            width: 60%;
            text-align: center;
            z-index: 5;
        }

        /* 메인 타이틀 (투박한 폰트) */
        .loading-title {
            color: #ccc;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 3px 3px #000;
        }

        /* 로딩 바 바깥 틀 */
        .progress-border {
            width: 100%;
            height: 30px;
            border: 3px solid #555;
            padding: 3px;
            background: #111;
            box-sizing: border-box;
        }

        /* 실제 차오르는 바 (파란색 메탈릭) */
        .progress-bar {
            width: 75%; /* 로딩 퍼센트 */
            height: 100%;
            background: linear-gradient(to bottom, #0044cc, #0088ff, #0044cc);
            box-shadow: 0 0 10px rgba(0, 136, 255, 0.5);
            animation: loading-sim 5s infinite ease-in-out;
        }

        /* 하단 팁 메시지 */
        .loading-tip {
            margin-top: 20px;
            color: #888;
            font-size: 16px;
        }

        .loading-tip b {
            color: #0088ff;
        }

        /* 퍼센트 텍스트 */
        .percent-text {
            color: #fff;
            font-size: 20px;
            margin-top: 10px;
        }

        /* 화면 미세 떨림 애니메이션 */
        @keyframes loading-sim {
            0% { width: 0%; }
            30% { width: 45%; }
            50% { width: 48%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }
        .crt-monitor { animation: flicker 0.05s infinite; }
    </style>
</head>
<body>

<div class="crt-monitor">
    <div class="crt-scanlines"></div>
    
    <div class="loading-container">
        <h1 class="loading-title">DATA LOADING...</h1>
        
        <div class="progress-border">
            <div class="progress-bar"></div>
        </div>
        
        <div class="percent-text">연결 중... 75%</div>
        
        <div class="loading-tip">
            <b>TIP:</b> 밤샘 코딩 중에는 <b>에너지 드링크</b>가 체력 회복에 도움이 됩니다.
        </div>
    </div>

    <!-- 하단 버전 정보 -->
    <div style="position:absolute; bottom:30px; right:40px; color:#444; font-size:12px;">
        V 1.0.24 BUILD (KOREA)
    </div>
</div>

</body>
</html>
