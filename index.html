<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Real CRT</title>

<style>
body {
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CRT 외형 (두꺼운 검은 프레임) */
.crt-frame {
    background: #000;
    padding: 40px;
    border-radius: 40px;
    box-shadow:
        0 0 100px rgba(0,0,0,0.9),
        inset 0 0 80px rgba(0,0,0,1);
}

/* CRT 화면 */
.crt {
    position: relative;
    width: 800px;
    height: 600px; /* 4:3 비율 */
    overflow: hidden;
    border-radius: 25px;

    /* 핵심: 곡률 느낌 */
    transform: perspective(900px) scale(1.05, 1.08);
}

/* 실제 이미지 */
.crt img {
    width: 100%;
    height: 100%;
    object-fit: cover;

    /* 살짝 흐림 + 색감 */
    filter:
        contrast(1.1)
        brightness(0.95)
        blur(0.5px);

    /* CRT 특유 약간 찌그러짐 */
    transform: scale(1.02, 0.98);
}

/* 스캔라인 */
.crt::before {
    content: "";
    position: absolute;
    inset: 0;

    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(0,0,0,0.25) 2px,
        rgba(0,0,0,0.25) 4px
    );

    pointer-events: none;
}

/* 강한 비네팅 + 곡면 강조 */
.crt::after {
    content: "";
    position: absolute;
    inset: 0;

    background: radial-gradient(
        ellipse at center,
        rgba(0,0,0,0) 55%,
        rgba(0,0,0,0.4) 75%,
        rgba(0,0,0,0.9) 100%
    );

    pointer-events: none;
}

/* CRT 가장자리 왜곡 느낌 (핵심) */
.curvature {
    position: absolute;
    inset: 0;
    pointer-events: none;

    background: radial-gradient(
        ellipse at center,
        transparent 60%,
        rgba(0,0,0,0.2) 80%,
        rgba(0,0,0,0.6) 100%
    );

    mix-blend-mode: multiply;
}

/* 살짝 깜빡임 */
@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.96; }
    100% { opacity: 1; }
}

.crt {
    animation: flicker 0.12s infinite;
}
</style>
</head>

<body>

<div class="crt-frame">
    <div class="crt">
        <!-- 너가 준 이미지 넣으면 됨 -->
        <img src="your-image.png">
        <div class="curvature"></div>
    </div>
</div>

</body>
</html>
