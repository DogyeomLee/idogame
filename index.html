<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>90s Analog TV - 동물의 왕국</title>
    <style>
        body {
            background-color: #0a0a0a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1500px; /* TV의 입체감을 위한 원근법 */
        }

        /* 1. TV 본체 (리얼한 플라스틱 바디) */
        .tv-body {
            position: relative;
            width: 850px;
            height: 650px;
            background: #2a2a2a; /* 짙은 회색 플라스틱 */
            /* 상단은 좁고 하단은 넓은 구형 TV 특유의 형태 */
            border-radius: 40px 40px 100px 100px / 20px 20px 50px 50px;
            box-shadow: 
                inset 10px 10px 20px rgba(255,255,255,0.05),
                inset -10px -10px 30px rgba(0,0,0,0.8),
                30px 50px 100px rgba(0,0,0,1);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 15px solid #1a1a1a;
        }

        /* TV 하단 스피커 및 버튼 영역 */
        .tv-controls {
            position: absolute;
            bottom: 30px;
            width: 80%;
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .speaker-grill {
            width: 150px;
            height: 20px;
            background: repeating-linear-gradient(90deg, #111, #111 4px, transparent 4px, transparent 8px);
        }

        .power-btn {
            width: 15px;
            height: 15px;
            background: #8b0000;
            border-radius: 50%;
            box-shadow: 0 0 5px red;
        }

        /* 2. 볼록하게 튀어나온 브라운관 유리 */
        .crt-glass-container {
            width: 85%;
            height: 75%;
            background: #000;
            border-radius: 50% / 10%; /* 볼록한 렌즈 형태 */
            position: relative;
            top: -20px;
            overflow: hidden;
            border: 12px solid #1a1a1a; /* 화면 테두리 고무 패킹 느낌 */
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* 3. 실제 화면 송출 (동물의 왕국 배경) */
        .screen-content {
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1549366021-9f761d450615?q=80&w=2000');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 50px;
            box-sizing: border-box;
            animation: flicker 0.15s infinite;
        }

        /* 4. 레트로 다큐멘터리 자막 */
        .subtitles {
            font-family: "Malgun Gothic", "Gulim", sans-serif;
            color: #fff;
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            /* 자막의 굵은 검정 테두리 (당시 방송 국룰) */
            text-shadow: 
                -3px -3px 0 #000, 3px -3px 0 #000, 
                -3px 3px 0 #000, 3px 3px 0 #000,
                0 5px 10px rgba(0,0,0,1);
            line-height: 1.5;
        }

        /* 5. 화면 위 노이즈 및 왜곡 레이어 */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            /* 화면 광택(Glare) 및 스캔라인 */
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%),
                repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            z-index: 10;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }
    </style>
</head>
<body>

<div class="tv-body">
    <!-- 화면 영역 -->
    <div class="crt-glass-container">
        <div class="overlay"></div>
        <div class="screen-content">
            <div class="subtitles">
                그는 굶주린 하이에나처럼<br>
                새로운 코드를 찾아 헤맵니다...
            </div>
        </div>
    </div>

    <!-- 하단 조작부 -->
    <div class="tv-controls">
        <div class="speaker-grill"></div>
        <div style="color: #444; font-size: 10px; font-weight: bold;">ANALOG S-2000</div>
        <div class="power-btn"></div>
    </div>
</div>

</body>
</html>
