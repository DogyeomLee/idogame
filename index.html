<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro CRT Terminal</title>
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* 1. 꽉 차고 큼직한 4:3 모니터 프레임 */
        .monitor {
            width: 90vw;
            max-width: 1100px;
            aspect-ratio: 4 / 3;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 40px;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.05), 0 50px 100px rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 2. [핵심] CRT 곡면 효과 (이미지 왜곡 없이 테두리만 볼록) */
        .screen-container {
            width: 100%;
            height: 100%;
            background: #0a0e05; /* 어두운 녹색 터미널 배경 */
            position: relative;
            overflow: hidden;
            
            /* 항아리 모양으로 화면을 깎음 */
            border-radius: 50% / 10%; 
            box-shadow: inset 0 0 150px rgba(0,0,0,1); /* 가쪽을 어둡게 눌러서 볼록해 보이게 함 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 3. 터미널 텍스트 스타일 */
        .terminal-text {
            color: #33ff33; /* 고전적인 터미널 그린 */
            font-size: 3.5vw;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px rgba(51, 255, 51, 0.8); /* 글자 번짐 효과 */
            z-index: 10;
        }

        /* 4. CRT 감성 오버레이 (미세한 줄무늬와 광택) */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 미세한 스캔라인 */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 볼록한 유리 반사광 */
        .glass-reflection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: 6;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="monitor">
        <div class="screen-container">
            <!-- 화면 중앙 텍스트 -->
            <div class="terminal-text">
                어서오십시오<br>
                게임하십시오
            </div>
            
            <!-- CRT 효과 레이어 -->
            <div class="crt-overlay"></div>
            <div class="glass-reflection"></div>
        </div>
    </div>

</body>
</html>
