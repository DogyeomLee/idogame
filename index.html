<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro XP CRT</title>
    <style>
        /* 1. 전체 배경: 어두운 방 안의 느낌 */
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. 4:3 모니터 프레임 */
        .monitor-frame {
            position: relative;
            width: 800px; /* 4:3 비율 유지 */
            height: 600px;
            background: #111;
            border: 40px solid #333; /* 두꺼운 모니터 베젤 */
            border-radius: 60px; /* 모니터 외관의 둥근 모서리 */
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. 실제 화면 (왜곡 효과 포함) */
        .crt-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0080ff url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Windows_XP_Bliss.jpg/1280px-Windows_XP_Bliss.jpg') no-repeat center;
            background-size: cover;
            border-radius: 40px; /* 내부 화면의 둥근 모서리 */
            
            /* 구부러진 왜곡 효과를 위한 마법의 속성 */
            transform: scale(1.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 화면 위의 유광 유리 및 비네팅(어두운 모서리) 효과 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(
                circle at center,
                rgba(255, 255, 255, 0.05) 0%,
                rgba(0, 0, 0, 0.1) 60%,
                rgba(0, 0, 0, 0.4) 100%
            );
            z-index: 10;
            pointer-events: none;
        }

        /* 미세한 스캔라인 */
        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 11;
            pointer-events: none;
        }

        /* 4. XP 윈도우 스타일 */
        .window {
            width: 80%;
            background: #ece9d8;
            border: 3px solid #0055e5;
            border-radius: 8px 8px 0 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            z-index: 5;
            font-family: 'Tahoma', '굴림', sans-serif;
        }

        .title-bar {
            background: linear-gradient(to bottom, #0058e6 0%, #3b8cf8 10%, #0053ee 100%);
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .close-btn {
            width: 21px; height: 21px;
            background: linear-gradient(to bottom, #e76c4a 0%, #c43a1d 100%);
            border: 1px solid #fff; border-radius: 3px;
            color: white; display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        .window-body { padding: 20px; color: #000; }
        
        .xp-panel {
            background: #fff; border: 1px solid #7f9db9;
            padding: 15px; margin-bottom: 10px; min-height: 150px;
        }

        .btn-xp {
            background: linear-gradient(to bottom, #fff 0%, #ebebe4 100%);
            border: 1px solid #003c74; border-radius: 3px;
            padding: 5px 15px; cursor: pointer; margin-right: 5px;
        }
        .btn-xp:hover { border-color: #ff9900; }

    </style>
</head>
<body>

<!-- 모니터 외관 -->
<div class="monitor-frame">
    <!-- 화면 내부 -->
    <div class="crt-screen">
        <div class="crt-overlay"></div>
        <div class="scanlines"></div>

        <!-- XP 창 -->
        <div class="window">
            <div class="title-bar">
                <span>내 포트폴리오.exe</span>
                <div class="close-btn" onclick="alert('오류: 종료할 수 없습니다.')">×</div>
            </div>
            <div class="window-body">
                <div class="xp-panel">
                    <h2 style="color:#003399; margin-top:0;">사용자 프로필</h2>
                    <p>안녕하세요! 4:3 모니터로 감상하는 XP 포트폴리오입니다.</p>
                    <p>이 화면은 브라운관 특유의 왜곡 효과가 적용되어 있습니다.</p>
                </div>
                <div class="controls">
                    <button class="btn-xp" onclick="location.href='https://github.com'">깃허브</button>
                    <button class="btn-xp" onclick="alert('준비 중!')">프로젝트</button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
