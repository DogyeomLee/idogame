<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeletal Fairy TV - Large & Clean</title>
    <style>
        /* 기본 스타일 초기화 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* 전체 배경은 완전 검은색 */
            overflow: hidden; /* 스크롤 방지 */
        }

        /* 1. TV 베젤 (전체 화면 크기 조절) */
        .tv-bezel {
            /* 화면에 꽉 차도록 설정 (여백 2%만 남김) */
            width: 96vw; 
            height: 96vh;
            
            /* 원본처럼 검은색 베젤 */
            background-color: #000; 
            
            /* 모서리를 원본처럼 '아주 살짝만' 둥글게 (0.5%) */
            border-radius: 0.5vw; 
            
            /* 부드러운 그림자로 베젤 입체감 표현 */
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1); 
            
            /* 내부 화면과의 간격 (베젤 두께) */
            padding: 1vw; 
            box-sizing: border-box;
            
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 2. TV 화면 (이미지가 표시되는 영역) */
        .tv-screen {
            width: 100%;
            height: 100%;
            background-color: #000;
            
            /* 화면 모서리도 베젤과 맞춰 아주 조금만 둥글게 */
            border-radius: 0.3vw; 
            
            overflow: hidden; /* 이미지가 모서리를 넘지 않게 */
            position: relative;
            
            /* 내부 그림자로 화면이 안으로 들어간 느낌 표현 */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); 
        }

        /* 3. 실제 이미지 콘텐츠 (지글거림 없음) */
        .tv-content {
            width: 100%;
            height: 100%;
            
            /* 이미지 설정 */
            background-image: url('image_0be285.jpg'); /* 원본 이미지 파일명 */
            background-size: contain; /* 이미지가 잘리지 않고 전체가 다 보이도록 */
            background-position: center; /* 중앙 정렬 */
            background-repeat: no-repeat; /* 반복 없음 */
            
            /* 이전 버전의 흐림/노이즈 필터 제거 (선명하게) */
            filter: none; 
            
            position: absolute;
            top: 0;
            left: 0;
        }

    </style>
</head>
<body>

    <!-- TV 베젤 (외부 프레임) -->
    <div class="tv-bezel">
        <!-- TV 화면 (이미지 영역) -->
        <div class="tv-screen">
            <!-- 선명한 이미지 콘텐츠 -->
            <div class="tv-content"></div>
        </div>
    </div>

</body>
</html>
